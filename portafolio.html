<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="\assets\css\css.css">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arriendos</title>

  <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/1761f4f6b0.js" crossorigin="anonymous"> </script>

  <!-- 🔹 Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body>

  <!-- 🔹 NAVBAR -->
  <!-- navbar-expand-lg: se colapsa en pantallas pequeñas -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top ">
    <div class="container ">
      <a class="navbar-brand text-white" href="#">Portafolio</a>
    </div>
  </nav>

  <!-- 🔹 MAIN -->
  <<main class="container mt-5 pt-4">

    <!-- 🔹 SECCIÓN DE CARDS -->
    <!-- row: fila -->
    <!-- g-4: espacio entre columnas -->
    <section class="row g-4">

      <!-- 📱 Responsive:
           col-12 → móvil (1 columna)
           col-md-6 → tablet (2 columnas)
           col-lg-4 → desktop (3 columnas)
      -->
      <article class="col-12 col-md-6 col-lg-4">
        <div class="card h-500 shadow-sm">
          
          <img
            src="assets\img\proyecto1.png"
            class="card-img-top"
          />
          <div class="card-body">
            <h5 class="card-title">
               <a href="https://github.com/neetizen500/Desafio1">Curriculum Base</a> 
            </h5>
            <hr/>
            <div class="d-flex justify-content-end align-items-center gap-2">
            </div>
          </div>
        </div>
      </article>

      <!-- Card 2 -->
      <article class="col-12 col-md-6 col-lg-4">
        <div class="card h-500 shadow-sm">
          <img
            src="assets\img\landing.png"
            class="card-img-top"
            alt="casa"
          />
          <div class="card-body">
            <h5 class="card-title">
               <a href="https://github.com/neetizen500/Desafio1">Landing Page</a> 
            </h5>
            <hr />
            <div class="d-flex justify-content-end align-items-center gap-2">
            </div>
          </div>
        </div>
      </article>

      <!-- Card 3 -->
      <article class="col-12 col-md-6 col-lg-4">
        <div class="card 500 shadow-sm">
          
          <img
            src="assets\img\iguana.png"
            class="card-img-top"
            alt="casa"
          />
          <div class="card-body">
            <h5 class="card-title">
             <a href="https://github.com/neetizen500/Desafio1">Grilla y iconos</a> 
            </h5>
            <hr />
            <div class="d-flex justify-content-end align-items-center gap-2">
            </div>
          </div>
        </div>
      </article>

    </section>

    <!-- 🔹 FORMULARIO -->
    <!-- mt-5: margen superior -->
    <p class="text-center"> <a href="index.html">Volver</a></p>
  </main>

  <!-- 🔹 FOOTER -->
  <footer class="text-center py-3 mt-4">
    <p class="mb-0">© 2026 José Garcia Portafolio</p>
  </footer>

  <!-- 🔹 Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
